<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travels of Paul</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; }
        svg { display: block; width: 100vw; height: 100vh; }

        /* ── Layer 1: Sea ── */
        #layer-sea { }
        .sea-bg { fill: #1a3a5c; }

        /* ── Layer 3: Provinces ── */
        #layer-provinces .province { pointer-events: none; }
        #layer-provinces .prov-label {
            font-size: 9px;
            fill: #fff;
            font-family: 'Segoe UI', sans-serif;
            font-style: italic;
            opacity: 0.7;
            pointer-events: none;
        }
        #layer-land { }
        #layer-land path {
            fill: #c8b89a;
            stroke: #a09070;
            stroke-width: 0.5;
            stroke-linejoin: round;
        }

        /* ── Layer 4: Cities ── */
        .city-group { cursor: pointer; }
        .city-dot {
            fill: #fff;
            stroke: #e74c3c;
            stroke-width: 1.5;
            transition: r 0.2s;
        }
        .city-group:hover .city-dot { r: 5; fill: #e74c3c; }
        .city-pulse {
            fill: none;
            stroke: #e74c3c;
            stroke-width: 1;
            opacity: 0;
        }
        .city-label {
            font-size: 8px;
            fill: #fff;
            font-family: 'Segoe UI', sans-serif;
            pointer-events: none;
            text-shadow: 0 0 3px #000;
        }

        /* ── Layer 5: Routes ── */
        .journey-path { pointer-events: none; }

        /* ── Info Panel ── */
        #info-panel { 
            opacity: 0; 
            transition: opacity 0.3s ease;
        }
        #info-panel.visible { opacity: 1; }
        .info-bg { 
            fill: rgba(0,0,0,0.75); 
            rx: 8; 
        }
        .info-text {
            font-family: 'Segoe UI', sans-serif;
            pointer-events: none;
        }
        .journey-badge { 
            font-size: 12px; 
            font-weight: bold; 
            fill: #000;
        }
        .city-name { 
            font-size: 16px; 
            font-weight: bold; 
            fill: #fff;
        }
        .reference { 
            font-size: 11px; 
            fill: #ffd700;
        }
        .event-text { 
            font-size: 10px; 
            fill: #ccc;
        }
        .close-btn { 
            cursor: pointer; 
            fill: #999; 
            font-size: 14px;
        }
        .close-btn:hover { fill: #fff; }

        /* ── UI Controls ── */
        .ui-btn { 
            cursor: pointer; 
            fill: #333; 
            stroke: #666; 
            stroke-width: 1;
        }
        .ui-btn:hover { fill: #555; }
        .ui-btn.active { fill: #666; }
        .ui-btn-text { 
            font-family: 'Segoe UI', sans-serif; 
            font-size: 12px; 
            fill: #fff; 
            pointer-events: none;
        }
        .journey-btn { font-size: 10px; }
        
        /* ── Traveler Icon ── */
        #traveler { pointer-events: none; }

        /* Walking animation — arms and legs swing opposite phase */
        @keyframes swing-arm-l { 0%,100%{transform:rotate(-20deg)} 50%{transform:rotate(20deg)} }
        @keyframes swing-arm-r { 0%,100%{transform:rotate(20deg)}  50%{transform:rotate(-20deg)} }
        @keyframes swing-leg-l { 0%,100%{transform:rotate(-18deg)} 50%{transform:rotate(18deg)} }
        @keyframes swing-leg-r { 0%,100%{transform:rotate(18deg)}  50%{transform:rotate(-18deg)} }
        .walk-arm-l { transform-origin:0 0; animation: swing-arm-l 0.55s ease-in-out infinite; }
        .walk-arm-r { transform-origin:0 0; animation: swing-arm-r 0.55s ease-in-out infinite; }
        .walk-leg-l { transform-origin:0 0; animation: swing-leg-l 0.55s ease-in-out infinite; }
        .walk-leg-r { transform-origin:0 0; animation: swing-leg-r 0.55s ease-in-out infinite; }

        /* ── Layer 8: Event Effects ── */
        @keyframes rock-fly { 0%{opacity:1} 80%{opacity:1} 100%{opacity:0;transform:translate(0,0) scale(0.3)} }
        @keyframes beam-fade { 0%{opacity:0.9} 100%{opacity:0} }
        @keyframes dark-spread { 0%{r:3;opacity:0.9} 100%{r:35;opacity:0} }
        @keyframes church-rise { 0%{opacity:0;transform:translateY(8px)} 30%{opacity:1;transform:translateY(0)} 80%{opacity:1} 100%{opacity:0} }
        @keyframes ray-grow { 0%{opacity:0;transform:scaleX(0)} 30%{opacity:0.9;transform:scaleX(1)} 80%{opacity:0.7} 100%{opacity:0} }
        @keyframes crowd-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
        @keyframes speech-ring { 0%{r:2;opacity:0.8;stroke-width:2} 100%{r:22;opacity:0;stroke-width:0.5} }
        @keyframes flame-flicker { 0%,100%{transform:scaleY(1) scaleX(1);opacity:0.9} 33%{transform:scaleY(1.3) scaleX(0.8);opacity:1} 66%{transform:scaleY(0.8) scaleX(1.2);opacity:0.7} }
        @keyframes tornado-spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        @keyframes traveler-shake { 0%,100%{transform:translate(0,0)} 10%{transform:translate(-3px,-1px)} 20%{transform:translate(3px,2px)} 30%{transform:translate(-4px,1px)} 40%{transform:translate(4px,-2px)} 50%{transform:translate(-2px,3px)} 60%{transform:translate(3px,-1px)} 70%{transform:translate(-3px,2px)} 80%{transform:translate(2px,-3px)} 90%{transform:translate(-1px,1px)} }
        @keyframes dove-fly { 0%{transform:translate(-15px,5px) scale(0.5);opacity:0} 40%{opacity:1} 100%{transform:translate(15px,-10px) scale(1);opacity:0} }
        @keyframes funnel-sway { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }

        /* ── Event Scene Panel ── */
        #event-scene { transform-box: fill-box; transform-origin: right center; }
        @keyframes ep-in  { from{transform:translateX(265px);opacity:0} to{transform:translateX(0);opacity:1} }
        @keyframes ep-out { 0%{transform:translateX(0);opacity:1} 100%{transform:translateX(265px);opacity:0} }
        .ep-in  { animation: ep-in  0.45s cubic-bezier(0.22,1,0.36,1) both; }
        .ep-out { animation: ep-out 0.35s ease-in both; }

        /* Mode-switch pop transition */
        @keyframes mode-pop {
          0%   { opacity:0; transform:scale(0.2); }
          60%  { transform:scale(1.3); }
          100% { opacity:1; transform:scale(1); }
        }
        .mode-pop { animation: mode-pop 0.4s cubic-bezier(.36,.07,.19,.97) forwards; }
    </style>
</head>

// Update traveler position and mode
function updateTraveler(path, progress, mode) {
  const traveler = document.getElementById('traveler');
  const length = path.getTotalLength();
  const pt = path.getPointAtLength(length * progress);
  const pt2 = path.getPointAtLength(Math.min(length * progress + 3, length));
  const angle = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180 / Math.PI;

  traveler.style.display = 'block';

  const isSeaMode = mode === 'sea';
  const landEl = document.getElementById('traveler-land');
  const seaEl  = document.getElementById('traveler-sea');

  // Trigger pop animation on mode change
  if (mode !== lastTravelerMode && lastTravelerMode !== null) {
    const incoming = isSeaMode ? seaEl : landEl;
    incoming.classList.remove('mode-pop');
    void incoming.offsetWidth; // force reflow to restart animation
    incoming.classList.add('mode-pop');
  }
  lastTravelerMode = mode;

  landEl.style.display = isSeaMode ? 'none' : 'block';
  seaEl.style.display  = isSeaMode ? 'block' : 'none';

  // Both stay upright — mirror horizontally when travelling leftward
  const flipX = (angle > 90 || angle < -90) ? -1 : 1;
  traveler.setAttribute('transform', `translate(${pt.x},${pt.y}) scale(${flipX},1)`);
}

// Animation function
function animate() {
  if (!isPlaying || !currentJourney) return;
  
  const now = performance.now();
  if (!startTime) startTime = now;
  
  const elapsed = now - startTime;
  const path = paths[currentJourney];
  const length = path.getTotalLength();
  const segments = getJourneySegments(currentJourney);
  
  // Speed: roughly 2 seconds per segment × speed multiplier
  const totalDuration = segments.length * 2000 / speedMultiplier;
  const progress = Math.min(elapsed / totalDuration, 1);
  
  // Update path drawing
  const offset = length * (1 - progress);
  path.style.strokeDashoffset = offset;
  
  // Determine current segment from PATH POSITION (geographic), not equal time slices.
  // segmentBoundaries[i] = path fraction where segment i ends (computed from city coords).
  const newSegmentIndex = segmentBoundaries.length > 0
    ? getSegmentIndexFromProgress(progress)
    : Math.floor(progress * segments.length);

  // Update traveler mode from the correct geographic segment
  const currentSeg = segments[Math.min(newSegmentIndex, segments.length - 1)];
  const mode = currentSeg ? currentSeg.mode : 'land';
  updateTraveler(path, progress, mode);

  if (newSegmentIndex > currentSegmentIndex && newSegmentIndex < segments.length) {
    currentSegmentIndex = newSegmentIndex;
    lastEffectSegFrac = 0;
    updateInfoPanel(segments[currentSegmentIndex], currentSegmentIndex, segments.length);
    // Trigger on-arrival event effects
    const seg = segments[currentSegmentIndex];
    const def = EFFECT_MAP[seg.id];
    if (def && def.triggerAt >= 1.0) {
      const mapping = CITY_ID_MAP[seg.to];
      let ex, ey;
      if (mapping && mapping.id) {
        const cityEl = document.getElementById(mapping.id);
        const dotEl = cityEl && cityEl.querySelector('.city-dot');
        if (dotEl) { ex = parseFloat(dotEl.getAttribute('cx')); ey = parseFloat(dotEl.getAttribute('cy')); }
      } else if (mapping) { ex = mapping.cx; ey = mapping.cy; }
      if (ex !== undefined) triggerEffect(seg.id, ex, ey);
    }
  }

  // Check mid-segment triggerAt effects (geographic fraction within current segment)
  if (currentSegmentIndex >= 0 && currentSegmentIndex < segments.length) {
    const curSeg = segments[currentSegmentIndex];
    const def = EFFECT_MAP[curSeg.id];
    if (def && def.triggerAt < 1.0) {
      const segStart = currentSegmentIndex > 0 ? segmentBoundaries[currentSegmentIndex - 1] : 0;
      const segEnd   = segmentBoundaries[currentSegmentIndex] || 1;
      const segFrac  = segEnd > segStart ? (progress - segStart) / (segEnd - segStart) : 0;
      if (lastEffectSegFrac < def.triggerAt && segFrac >= def.triggerAt) {
        const effPt = path.getPointAtLength(length * progress);
        triggerEffect(curSeg.id, effPt.x, effPt.y);
      }
      lastEffectSegFrac = segFrac;
    }
  }
  
  // Update timeline bar
  updateTimeline(progress);

  if (progress >= 1) {
    // Journey complete
    stopAnimation();
    showCompletion(currentJourney);
  } else {
    animationId = requestAnimationFrame(animate);
  }
}

// ─── TIMELINE BAR ───────────────────────────────────────────────
const TIMELINE_X = 10, TIMELINE_W = 780;
const JOURNEY_COLORS_MAP = {J1:'#f1c40f', J2:'#e67e22', J3:'#9b59b6', J4:'#e74c3c'};

function updateTimeline(progress) {
  const color = JOURNEY_COLORS_MAP[currentJourney] || '#f1c40f';
  const px = TIMELINE_X + TIMELINE_W * progress;
  const segments = currentJourney ? getJourneySegments(currentJourney) : [];
  const segIdx = Math.max(0, Math.min(currentSegmentIndex, segments.length - 1));

  // Traveled fill (dimmer — everything up to scrubber)
  const fill = document.getElementById('timeline-fill');
  fill.setAttribute('fill', color);
  fill.setAttribute('width', TIMELINE_W * progress);

  // Current segment highlight (bright — from segment start to scrubber)
  const band = document.getElementById('timeline-segment-band');
  band.setAttribute('fill', color);
  const segStartFrac = (segIdx > 0 && segmentBoundaries.length > 0)
    ? (segmentBoundaries[segIdx - 1] || 0) : 0;
  const segStartX = TIMELINE_X + TIMELINE_W * segStartFrac;
  band.setAttribute('x', segStartX);
  band.setAttribute('width', Math.max(0, px - segStartX));

  // Scrubber
  document.getElementById('timeline-scrubber').setAttribute('cx', px);

  // FROM label — left of segment band, shows city we departed
  const fromLabel = document.getElementById('timeline-from-label');
  if (segments.length > 0) {
    const fromCity = segments[segIdx] ? segments[segIdx].from : '';
    // Abbreviate to 8 chars max
    fromLabel.textContent = fromCity.length > 9 ? fromCity.slice(0, 8) + '…' : fromCity;
    fromLabel.setAttribute('x', segStartX + 2);
  }

  // TO label — above scrubber, shows destination city
  const toLabel = document.getElementById('timeline-to-label');
  if (segments.length > 0) {
    const toCity = segments[segIdx] ? segments[segIdx].to : '';
    toLabel.textContent = toCity.length > 9 ? toCity.slice(0, 8) + '…' : toCity;
    // Keep label on screen
    const labelX = Math.max(30, Math.min(px, TIMELINE_X + TIMELINE_W - 20));
    toLabel.setAttribute('x', labelX);
  }
}

function renderTimelineTicks(journey, boundaries) {
  const container = document.getElementById('timeline-ticks');
  container.innerHTML = '';
  const color = JOURNEY_COLORS_MAP[journey] || '#fff';
  document.getElementById('timeline-fill').setAttribute('fill', color);
  document.getElementById('timeline-segment-band').setAttribute('fill', color);
  const ns = 'http://www.w3.org/2000/svg';
  // Draw city dots at each segment boundary (excluding the very last = 1.0)
  boundaries.slice(0, -1).forEach(frac => {
    const cx = TIMELINE_X + TIMELINE_W * frac;
    const dot = document.createElementNS(ns, 'circle');
    dot.setAttribute('cx', cx);
    dot.setAttribute('cy', '490');
    dot.setAttribute('r', '2.5');
    dot.setAttribute('fill', 'rgba(255,255,255,0.7)');
    dot.setAttribute('stroke', 'rgba(0,0,0,0.4)');
    dot.setAttribute('stroke-width', '0.8');
    container.appendChild(dot);
  });
}

// Scrub timeline on tap/drag
(function() {
  const svg = document.querySelector('svg');
  const bar = document.getElementById('timeline-bar');
  let scrubbing = false;

  function scrubTo(clientX) {
    if (!currentJourney) return;
    const rect = svg.getBoundingClientRect();
    const svgW = 800; // viewBox width
    const scale = rect.width / svgW;
    const localX = (clientX - rect.left) / scale;
    const progress = Math.max(0, Math.min(1, (localX - TIMELINE_X) / TIMELINE_W));

    // Pause and jump
    if (isPlaying) { stopAnimation(); }
    const segments = getJourneySegments(currentJourney);
    const totalDuration = segments.length * 2000 / speedMultiplier;
    startTime = performance.now() - progress * totalDuration;
    const path = paths[currentJourney];
    const length = path.getTotalLength();
    path.style.strokeDashoffset = length * (1 - progress);
    updateTimeline(progress);
    // Update info panel — use geographic boundaries if available
    const idx = segmentBoundaries.length > 0
      ? getSegmentIndexFromProgress(progress)
      : Math.min(Math.floor(progress * segments.length), segments.length - 1);
    currentSegmentIndex = idx;
    updateInfoPanel(segments[idx], idx, segments.length);
    // Resume
    isPlaying = true;
    playPauseText.textContent = '⏸';
    animationId = requestAnimationFrame(animate);
  }

  bar.addEventListener('mousedown', e => { scrubbing = true; scrubTo(e.clientX); });
  bar.addEventListener('touchstart', e => { scrubbing = true; scrubTo(e.touches[0].clientX); }, {passive:true});
  window.addEventListener('mousemove', e => { if (scrubbing) scrubTo(e.clientX); });
  window.addEventListener('touchmove', e => { if (scrubbing) scrubTo(e.touches[0].clientX); }, {passive:true});
  window.addEventListener('mouseup', () => scrubbing = false);
  window.addEventListener('touchend', () => scrubbing = false);
})();

// Start animation for a journey
let segmentBoundaries = []; // fractions of path length where each segment ends

function computeSegmentBoundaries(pathEl, segments) {
  // Use straight-line SVG distance between city coords to allocate path fractions.
  // This is immune to round-trip false matches and routes that cross the same
  // coordinate twice (e.g. J2's Corinth→Ephesus sea route passing near Athens).

  function getCityCoords(cityName) {
    const mapping = CITY_ID_MAP[cityName];
    if (mapping && mapping.id) {
      const el = document.getElementById(mapping.id);
      const dot = el && el.querySelector('.city-dot');
      if (dot) return { x: parseFloat(dot.getAttribute('cx')), y: parseFloat(dot.getAttribute('cy')) };
    }
    if (mapping && mapping.cx !== undefined) return { x: mapping.cx, y: mapping.cy };
    // Last resort: CITY_COORDS table
    const cc = CITY_COORDS[cityName];
    if (cc) return { x: cc.cx, y: cc.cy };
    return null;
  }

  // Distance for each segment (straight-line between from→to SVG coords)
  const distances = segments.map(seg => {
    const from = getCityCoords(seg.from);
    const to   = getCityCoords(seg.to);
    if (from && to) return Math.hypot(to.x - from.x, to.y - from.y);
    return 1; // fallback: equal weight
  });

  const totalDist = distances.reduce((a, b) => a + b, 0);
  let cumulative = 0;
  const boundaries = distances.map(d => {
    cumulative += d;
    return cumulative / totalDist;
  });
  boundaries[boundaries.length - 1] = 1.0;
  return boundaries;
}

function getSegmentIndexFromProgress(progress) {
  for (let i = 0; i < segmentBoundaries.length; i++) {
    if (progress < segmentBoundaries[i]) return i;
  }
  return segmentBoundaries.length - 1;
}

function startJourney(journey) {
  stopAnimation();
  currentJourney = journey;
  currentSegmentIndex = -1;
  startTime = null;

  // Reset all paths
  Object.keys(paths).forEach(j => {
    const path = paths[j];
    const length = path.getTotalLength();
    path.style.strokeDashoffset = length;
  });

  // Compute where each city actually sits on this journey's path
  const segments = getJourneySegments(journey);
  segmentBoundaries = computeSegmentBoundaries(paths[journey], segments);

  // Draw tick marks on timeline
  renderTimelineTicks(journey, segmentBoundaries);

  isPlaying = true;
  playPauseText.textContent = '⏸';

  if (segments.length > 0) {
    currentSegmentIndex = 0;
    updateInfoPanel(segments[0], 0, segments.length);
  }

  animationId = requestAnimationFrame(animate);
}

// Stop animation
function stopAnimation() {
  isPlaying = false;
  playPauseText.textContent = '▶';
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }
  document.getElementById('traveler').style.display = 'none';
  updateTimeline(0);
}

// Toggle play/pause
function togglePlayPause() {
  if (isPlaying) {
    stopAnimation();
  } else if (currentJourney) {
    isPlaying = true;
    playPauseText.textContent = '⏸';
    animationId = requestAnimationFrame(animate);
  } else {
    // Start J1 by default
    startJourney('J1');
  }
}

  'j4-3': { type:'shipwreck',    triggerAt:0.45 }  // Euroclydon — mid-sea between Crete and Malta

  setTimeout(() => { t.style.animation = ''; }, durationMs);

  // Animate in

  panel.classList.remove('ep-out','ep-in');
  void panel.getBBox(); // force reflow
  panel.classList.add('ep-in');
  // Auto-hide after 8s
  clearTimeout(eventPanelTimer);
  eventPanelTimer = setTimeout(() => {
    panel.classList.remove('ep-in');
    panel.classList.add('ep-out');
    setTimeout(() => { panel.style.display='none'; panel.classList.remove('ep-out'); }, 400);
  }, 8000);
}

function triggerEffect(segId, cx, cy) {
  const def = EFFECT_MAP[segId];
  if (!def) return;
  const layer = document.getElementById('layer-effects');
  layer.innerHTML = '';
  // Physical shake for stoning and shipwreck
  if (def.type === 'stoning' || def.type === 'shipwreck') {
    shakeEffect(def.type === 'shipwreck' ? 3000 : 1200);
  }
  // Show large event scene panel on right side
  const journeyColor = currentJourney ? JOURNEY_COLORS[currentJourney] : '#f1c40f';
  showEventScene(def.type, journeyColor);
}

      hand1.setAttribute('fill', 'none'); hand1.setAttribute('stroke', '#8060a0');
      hand1.setAttribute('stroke-width', '2'); hand1.setAttribute('stroke-linecap', 'round');
      hand1.style.animation = 'beam-fade 1.8s ease-out 0.3s forwards';
      layer.appendChild(hand1);
    }, 800);
  }

  else if (def.type === 'stoning') {
    // 6 irregular rocks (polygons) animate FROM surrounding positions INWARD to cx,cy
    shakeEffect(1200);
    const rockAngles = [0, 55, 110, 180, 230, 310];
    const startR = 28;
    rockAngles.forEach((angleDeg, i) => {
      const rad = angleDeg * Math.PI / 180;
      const sx = cx + Math.cos(rad) * startR;
      const sy = cy + Math.sin(rad) * startR;
      const rock = document.createElementNS(ns, 'polygon');
      // Irregular polygon shape offset around (0,0), will be translated to start pos
      const pts = [[0,-3],[2,-4],[4,-2],[3,1],[1,3],[-2,2],[-3,-1]];
      rock.setAttribute('points', pts.map(p=>`${sx+p[0]},${sy+p[1]}`).join(' '));
      rock.setAttribute('fill', `hsl(${20+i*8},${15+i*5}%,${45+i*5}%)`);
      rock.setAttribute('stroke', '#555'); rock.setAttribute('stroke-width', '0.5');
      // Animate: move from (sx,sy) to (cx,cy)
      const dx = cx - sx, dy = cy - sy;
      const animX = document.createElementNS(ns, 'animateTransform');
      animX.setAttribute('attributeName', 'transform');
      animX.setAttribute('type', 'translate');
      animX.setAttribute('from', '0 0');
      animX.setAttribute('to', `${dx} ${dy}`);
      animX.setAttribute('dur', `${0.3 + i*0.06}s`);
      animX.setAttribute('begin', `${i*0.08}s`);
      animX.setAttribute('fill', 'freeze');
      rock.appendChild(animX);
      rock.style.animation = `rock-fly ${0.4+i*0.06}s ease-in ${i*0.08}s forwards`;
      layer.appendChild(rock);
    });
    // After rocks: "fallen" figure — horizontal line — then it rises back
    setTimeout(() => {
      layer.innerHTML = '';
      const fallen = document.createElementNS(ns, 'line');
      fallen.setAttribute('x1', cx-8); fallen.setAttribute('y1', cy+2);
      fallen.setAttribute('x2', cx+8); fallen.setAttribute('y2', cy+2);
      fallen.setAttribute('stroke', '#f0c890'); fallen.setAttribute('stroke-width', '3');
      fallen.setAttribute('stroke-linecap', 'round');
      fallen.style.animation = 'beam-fade 1.5s ease-out forwards';
      layer.appendChild(fallen);
      // Rising text indicator
      const rise = document.createElementNS(ns, 'text');
      rise.setAttribute('x', cx); rise.setAttribute('y', cy-14);
      rise.setAttribute('text-anchor', 'middle');
      rise.setAttribute('font-size', '9'); rise.setAttribute('fill', '#e8d5a3');
      rise.setAttribute('font-family', 'sans-serif');
      rise.textContent = 'Rose up ↑';
      rise.style.animation = 'church-rise 2s ease-out 0.8s forwards';
      layer.appendChild(rise);
    }, 900);
  }

  else if (def.type === 'first_church') {
    // Church silhouette + dove + gold rays
    const g = document.createElementNS(ns, 'g');
    g.style.animation = 'church-rise 3s ease-out forwards';
    // Building
    const wall = document.createElementNS(ns, 'rect');
    wall.setAttribute('x', cx-10); wall.setAttribute('y', cy-16);
    wall.setAttribute('width', '20'); wall.setAttribute('height', '16');
    wall.setAttribute('fill', '#d4c4a0'); wall.setAttribute('stroke', '#8a7050'); wall.setAttribute('stroke-width', '1');
    g.appendChild(wall);
    // Roof triangle
    const roof = document.createElementNS(ns, 'polygon');
    roof.setAttribute('points', `${cx-13},${cy-16} ${cx},${cy-28} ${cx+13},${cy-16}`);
    roof.setAttribute('fill', '#b04030'); roof.setAttribute('stroke', '#802010'); roof.setAttribute('stroke-width', '1');
    g.appendChild(roof);
    // Cross
    const crossV = document.createElementNS(ns, 'line');
    crossV.setAttribute('x1',cx); crossV.setAttribute('y1',cy-26); crossV.setAttribute('x2',cx); crossV.setAttribute('y2',cy-18);
    crossV.setAttribute('stroke','#f1c40f'); crossV.setAttribute('stroke-width','2'); g.appendChild(crossV);
    const crossH = document.createElementNS(ns, 'line');
    crossH.setAttribute('x1',cx-4); crossH.setAttribute('y1',cy-23); crossH.setAttribute('x2',cx+4); crossH.setAttribute('y2',cy-23);
    crossH.setAttribute('stroke','#f1c40f'); crossH.setAttribute('stroke-width','2'); g.appendChild(crossH);
    // Door
    const door = document.createElementNS(ns, 'rect');
    door.setAttribute('x',cx-3); door.setAttribute('y',cy-10);
    door.setAttribute('width','6'); door.setAttribute('height','10');
    door.setAttribute('rx','3'); door.setAttribute('fill','#4a3820');
    g.appendChild(door);
    layer.appendChild(g);
    // Gold rays around church
    for (let i = 0; i < 8; i++) {
      const a = (i/8)*360 * Math.PI/180;
      const r1=18, r2=34;
      const rayEl = document.createElementNS(ns, 'line');
      rayEl.setAttribute('x1', cx+Math.cos(a)*r1); rayEl.setAttribute('y1', cy-12+Math.sin(a)*r1);
      rayEl.setAttribute('x2', cx+Math.cos(a)*r2); rayEl.setAttribute('y2', cy-12+Math.sin(a)*r2);
      rayEl.setAttribute('stroke','#f1c40f'); rayEl.setAttribute('stroke-width','1.5');
      rayEl.setAttribute('stroke-linecap','round');
      rayEl.style.animation = `ray-grow 2s ease-out ${i*0.07}s forwards`;
      rayEl.style.transformOrigin = `${cx+Math.cos(a)*r1}px ${cy-12+Math.sin(a)*r1}px`;
      layer.appendChild(rayEl);
    }
    // Dove path
    const dove = document.createElementNS(ns, 'path');
    dove.setAttribute('d', `M${cx-6},${cy-32} C${cx-2},${cy-38} ${cx+6},${cy-37} ${cx+8},${cy-33} C${cx+10},${cy-29} ${cx+6},${cy-27} ${cx},${cy-30} C${cx-4},${cy-28} ${cx-7},${cy-30} ${cx-6},${cy-32}Z`);
    dove.setAttribute('fill','#fff'); dove.setAttribute('opacity','0.9');
    dove.style.animation = 'dove-fly 2.5s ease-out 0.5s forwards';
    layer.appendChild(dove);
  }

  else if (def.type === 'mars_hill') {
    // Hill arc (Areopagus) + tiny speaker figure + crowd semicircle + speech waves
    const hill = document.createElementNS(ns, 'path');
    hill.setAttribute('d', `M${cx-30},${cy+5} Q${cx},${cy-18} ${cx+30},${cy+5}`);
    hill.setAttribute('fill','#c8b898'); hill.setAttribute('stroke','#a09070'); hill.setAttribute('stroke-width','1');
    hill.style.animation = 'church-rise 3s ease-out forwards';
    layer.appendChild(hill);
    // Tiny speaker on hilltop
    const speaker = document.createElementNS(ns, 'g');
    const head = document.createElementNS(ns, 'circle');
    head.setAttribute('cx',cx); head.setAttribute('cy',cy-22); head.setAttribute('r','2.5');
    head.setAttribute('fill','#f0c890');
    speaker.appendChild(head);
    const body = document.createElementNS(ns, 'line');
    body.setAttribute('x1',cx); body.setAttribute('y1',cy-20); body.setAttribute('x2',cx); body.setAttribute('y2',cy-13);
    body.setAttribute('stroke','#6b5535'); body.setAttribute('stroke-width','2');
    speaker.appendChild(body);
    speaker.style.animation = 'church-rise 3s ease-out forwards';
    layer.appendChild(speaker);
    // Crowd dots below in semicircle
    for (let i = 0; i < 12; i++) {
      const a = (i/11) * Math.PI; // semicircle below
      const r = 22;
      const dot = document.createElementNS(ns, 'circle');
      dot.setAttribute('cx', cx + Math.cos(Math.PI + a)*r);
      dot.setAttribute('cy', cy + 5 + Math.abs(Math.sin(a))*8);
      dot.setAttribute('r','2'); dot.setAttribute('fill','#d4b87a');
      dot.style.animation = `crowd-bob 0.6s ease-in-out ${i*0.1}s infinite, church-rise 1s ease-out ${i*0.05}s forwards`;
      layer.appendChild(dot);
    }
    // Speech arcs radiating from speaker
    for (let i = 0; i < 4; i++) {
      const arc = document.createElementNS(ns, 'circle');
      arc.setAttribute('cx', cx); arc.setAttribute('cy', cy-18);
      arc.setAttribute('r','2'); arc.setAttribute('fill','none');
      arc.setAttribute('stroke','#f1c40f'); arc.setAttribute('stroke-width','1.5');
      arc.style.animation = `speech-ring 1.2s ease-out ${i*0.3}s infinite`;
      layer.appendChild(arc);
    }
  }

  else if (def.type === 'artemis_riot') {
    // Temple facade + theater semicircle + fire + crowd
    // Temple columns
    const templeBase = document.createElementNS(ns, 'rect');
    templeBase.setAttribute('x',cx-18); templeBase.setAttribute('y',cy-20);
    templeBase.setAttribute('width','36'); templeBase.setAttribute('height','20');
    templeBase.setAttribute('fill','#d4c4a0'); templeBase.setAttribute('stroke','#8a7050'); templeBase.setAttribute('stroke-width','1');
    templeBase.style.animation = 'church-rise 0.5s ease-out forwards';
    layer.appendChild(templeBase);
    // 5 columns
    for (let i = 0; i < 5; i++) {
      const col = document.createElementNS(ns, 'rect');
      col.setAttribute('x', cx-16+i*8); col.setAttribute('y', cy-20);
      col.setAttribute('width','2.5'); col.setAttribute('height','20');
      col.setAttribute('fill','#a09070');
      col.style.animation = 'church-rise 0.5s ease-out forwards';
      layer.appendChild(col);
    }
    // Temple pediment
    const pediment = document.createElementNS(ns, 'polygon');
    pediment.setAttribute('points', `${cx-20},${cy-20} ${cx},${cy-32} ${cx+20},${cy-20}`);
    pediment.setAttribute('fill','#c8b898'); pediment.setAttribute('stroke','#8a7050'); pediment.setAttribute('stroke-width','1');
    pediment.style.animation = 'church-rise 0.5s ease-out forwards';
    layer.appendChild(pediment);
    // Theater arc (crowd)
    const theater = document.createElementNS(ns, 'path');
    theater.setAttribute('d', `M${cx-30},${cy+15} A30,15 0 0,1 ${cx+30},${cy+15}`);
    theater.setAttribute('fill','rgba(100,80,50,0.3)'); theater.setAttribute('stroke','#8a7050'); theater.setAttribute('stroke-width','1');
    theater.style.animation = 'church-rise 1s ease-out 0.2s forwards';
    layer.appendChild(theater);
    // Angry crowd dots in theater
    for (let i = 0; i < 16; i++) {
      const a = (i/15) * Math.PI;
      const r = 24 + (i%3)*5;
      const dot = document.createElementNS(ns, 'circle');
      dot.setAttribute('cx', cx-30+i*4); dot.setAttribute('cy', cy+10-Math.sin(a)*8);
      dot.setAttribute('r','1.8'); dot.setAttribute('fill', i%2===0?'#c8a060':'#a08040');
      dot.style.animation = `crowd-bob ${0.2+Math.random()*0.3}s ease-in-out ${i*0.05}s infinite`;
      layer.appendChild(dot);
    }
    // Fire flames below temple
    const fireColors = ['#e74c3c','#e67e22','#f1c40f'];
    for (let i = 0; i < 6; i++) {
      const flame = document.createElementNS(ns, 'polygon');
      const fx = cx-12+i*5, fy = cy-1;
      flame.setAttribute('points', `${fx},${fy} ${fx-3},${fy-8-i%2*4} ${fx+3},${fy-8-i%3*3}`);
      flame.setAttribute('fill', fireColors[i%3]);
      flame.setAttribute('opacity','0.85');
      flame.style.animation = `flame-flicker ${0.3+i*0.07}s ease-in-out ${i*0.05}s infinite`;
      layer.appendChild(flame);
    }
  }

  else if (def.type === 'shipwreck') {
    // Actual tornado/whirlwind funnel + waves + lightning + boat shakes
    shakeEffect(3000);
    // Dark storm cloud at top
    const cloud = document.createElementNS(ns, 'ellipse');
    cloud.setAttribute('cx', cx); cloud.setAttribute('cy', cy-30);
    cloud.setAttribute('rx','22'); cloud.setAttribute('ry','9');
    cloud.setAttribute('fill','rgba(40,50,80,0.85)');
    layer.appendChild(cloud);
    // Tornado funnel — left and right sides of cone narrowing to point
    const funnel = document.createElementNS(ns, 'g');
    funnel.setAttribute('transform-origin', `${cx}px ${cy-30}px`);
    funnel.style.animation = 'funnel-sway 0.5s ease-in-out infinite';
    const funnelShape = document.createElementNS(ns, 'path');
    funnelShape.setAttribute('d',
      `M${cx-20},${cy-22} C${cx-16},${cy-12} ${cx-6},${cy-4} ${cx-2},${cy+8} L${cx+2},${cy+8} C${cx+6},${cy-4} ${cx+16},${cy-12} ${cx+20},${cy-22} Z`
    );
    funnelShape.setAttribute('fill','rgba(80,100,150,0.6)');
    funnelShape.setAttribute('stroke','rgba(100,140,200,0.8)');
    funnelShape.setAttribute('stroke-width','1');
    funnel.appendChild(funnelShape);
    // Spiral lines inside funnel
    for (let i = 0; i < 4; i++) {
      const sw = document.createElementNS(ns, 'path');
      const y0 = cy-20+i*6, xOff = 14-i*3;
      sw.setAttribute('d', `M${cx-xOff},${y0} Q${cx},${y0-3} ${cx+xOff},${y0}`);
      sw.setAttribute('fill','none'); sw.setAttribute('stroke','rgba(150,180,230,0.7)');
      sw.setAttribute('stroke-width','1.2');
      funnel.appendChild(sw);
    }
    layer.appendChild(funnel);
    // Rotating debris specks around funnel mid-point
    const debrisG = document.createElementNS(ns, 'g');
    debrisG.style.transformOrigin = `${cx}px ${cy-8}px`;
    debrisG.style.animation = 'tornado-spin 0.6s linear infinite';
    for (let i = 0; i < 6; i++) {
      const a = (i/6)*2*Math.PI;
      const r = 14;
      const d = document.createElementNS(ns, 'rect');
      d.setAttribute('x', cx+Math.cos(a)*r-1.5); d.setAttribute('y', cy-8+Math.sin(a)*r-1.5);
      d.setAttribute('width','3'); d.setAttribute('height','3');
      d.setAttribute('fill','#a0a0c0'); d.setAttribute('rx','0.5');
      debrisG.appendChild(d);
    }
    layer.appendChild(debrisG);
    // Rain streaks
    for (let i = 0; i < 10; i++) {
      const rain = document.createElementNS(ns, 'line');
      const rx = cx-25+i*6, ry = cy-28+Math.random()*10;
      rain.setAttribute('x1', rx); rain.setAttribute('y1', ry);
      rain.setAttribute('x2', rx+2); rain.setAttribute('y2', ry+12);
      rain.setAttribute('stroke','rgba(120,160,220,0.7)'); rain.setAttribute('stroke-width','1');
      rain.style.animation = `beam-fade 0.4s linear ${i*0.07}s infinite`;
      layer.appendChild(rain);
    }
    // Wave lines on sea surface
    for (let i = 0; i < 3; i++) {
      const wave = document.createElementNS(ns, 'path');
      const wy = cy+10+i*6;
      wave.setAttribute('d', `M${cx-30},${wy} Q${cx-20},${wy-5} ${cx-10},${wy} Q${cx},${wy+5} ${cx+10},${wy} Q${cx+20},${wy-5} ${cx+30},${wy}`);
      wave.setAttribute('fill','none'); wave.setAttribute('stroke','rgba(100,160,220,0.6)');
      wave.setAttribute('stroke-width','1.5');
      wave.style.animation = `funnel-sway ${0.4+i*0.1}s ease-in-out ${i*0.12}s infinite`;
      layer.appendChild(wave);
    }
    // Lightning bolt
    const bolt = document.createElementNS(ns, 'polyline');
    bolt.setAttribute('points', `${cx+5},${cy-38} ${cx-2},${cy-24} ${cx+6},${cy-20} ${cx-3},${cy-8}`);
    bolt.setAttribute('fill','none'); bolt.setAttribute('stroke','#f1c40f');
    bolt.setAttribute('stroke-width','2.5'); bolt.setAttribute('stroke-linecap','round');
    bolt.style.animation = 'beam-fade 0.3s ease-in-out 0.2s 5 alternate';
    layer.appendChild(bolt);
  }

  // Auto-clear after 4s
  setTimeout(() => {
    layer.innerHTML = '';
    const t = document.getElementById('traveler');
    if (t) t.style.animation = '';
  }, 4000);

  // Show large event scene panel on right side
  const journeyColor = currentJourney ? JOURNEY_COLORS[currentJourney] : '#f1c40f';
  showEventScene(def.type, journeyColor);
}

// Event listeners
playPauseBtn.addEventListener('click', togglePlayPause);

document.getElementById('j1-btn').addEventListener('click', () => startJourney('J1'));
document.getElementById('j2-btn').addEventListener('click', () => startJourney('J2'));
document.getElementById('j3-btn').addEventListener('click', () => startJourney('J3'));
document.getElementById('j4-btn').addEventListener('click', () => startJourney('J4'));

// Speed toggle: 1× → 2× → 4× → 1×
let speedMultiplier = 1;
const SPEED_STEPS = [1, 2, 4];
document.getElementById('speed-btn').addEventListener('click', () => {
  const idx = (SPEED_STEPS.indexOf(speedMultiplier) + 1) % SPEED_STEPS.length;
  speedMultiplier = SPEED_STEPS[idx];
  document.getElementById('speed-text').textContent = speedMultiplier + '×';
  // Adjust startTime so progress is continuous at new speed
  if (isPlaying && startTime !== null) {
    const path = paths[currentJourney];
    const segments = getJourneySegments(currentJourney);
    const length = path.getTotalLength();
    const currentOffset = parseFloat(path.style.strokeDashoffset) || 0;
    const currentProgress = 1 - currentOffset / length;
    const totalDuration = segments.length * 2000 / speedMultiplier;
    startTime = performance.now() - currentProgress * totalDuration;
  }
});

// Splash screen — tap to dismiss
(function() {
  const splash = document.getElementById('splash');
  splash.addEventListener('click', () => {
    splash.style.display = 'none';
    // Auto-start last played journey or J1
    const last = localStorage.getItem('paul_last_journey') || 'J1';
    startJourney(last);
  });
})();

// Wrap startJourney to save last journey
const _origStartJourney = startJourney;
startJourney = function(journey) {
  _origStartJourney(journey);
  try { localStorage.setItem('paul_last_journey', journey); } catch(e) {}
};

closeBtn.addEventListener('click', hideInfoPanel);

// Step to a specific segment index (pauses animation, draws path to that point)
function stepToSegment(index) {
  if (!currentJourney) { startJourney('J1'); return; }
  const segments = getJourneySegments(currentJourney);
  if (index < 0 || index >= segments.length) return;
  stopAnimation();
  currentSegmentIndex = index;
  const path = paths[currentJourney];
  const length = path.getTotalLength();
  // Use geographic boundary fraction if available, else equal division
  const frac = segmentBoundaries.length > index
    ? segmentBoundaries[index]
    : (index + 1) / segments.length;
  path.style.strokeDasharray = length;
  path.style.strokeDashoffset = length * (1 - frac);
  const segMode = segments[index].mode;
  updateTraveler(path, frac, segMode);
  updateTimeline(frac);
  updateInfoPanel(segments[index], index, segments.length);
  // Trigger event effect using CITY_ID_MAP (not brittle string transform)
  const stepSeg = segments[index];
  const stepMapping = CITY_ID_MAP[stepSeg.to];
  let sx, sy;
  if (stepMapping && stepMapping.id) {
    const el = document.getElementById(stepMapping.id);
    const dot = el && el.querySelector('.city-dot');
    if (dot) { sx = parseFloat(dot.getAttribute('cx')); sy = parseFloat(dot.getAttribute('cy')); }
  } else if (stepMapping) { sx = stepMapping.cx; sy = stepMapping.cy; }
  if (sx !== undefined) triggerEffect(stepSeg.id, sx, sy);
}

function stepNext() {
  if (!currentJourney) { startJourney('J1'); return; }
  stepToSegment(Math.min(currentSegmentIndex + 1, getJourneySegments(currentJourney).length - 1));
}

function stepPrev() {
  if (!currentJourney) return;
  stepToSegment(Math.max(currentSegmentIndex - 1, 0));
}

document.getElementById('prev-btn').addEventListener('click', (e) => { e.stopPropagation(); stepPrev(); });
document.getElementById('next-btn').addEventListener('click', (e) => { e.stopPropagation(); stepNext(); });

// City click handlers
document.querySelectorAll('.city-group').forEach(cityGroup => {
  cityGroup.addEventListener('click', (e) => {
    e.stopPropagation();
    const cityName = cityGroup.getAttribute('data-name');
    showCityEvents(cityName);
  });
});

// Hide panel when clicking elsewhere
document.addEventListener('click', (e) => {
  if (!infoPanel.contains(e.target) && !e.target.closest('.city-group')) {
    hideInfoPanel();
  }
});

</script>
</body>
