<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen SVG App</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #222; }
        svg { display: block; width: 100vw; height: 100vh; }
        .interactive { cursor: pointer; transition: fill 0.3s; }
        .interactive:hover { fill: #ff4081; }
    </style>
</head>
<body>
    <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
        <!-- Background -->
        <rect width="100" height="100" fill="#333" />
        
        <!-- Animated Circle -->
        <circle cx="50" cy="50" r="10" fill="#00bcd4" class="interactive" onclick="alert('Clicked!')">
            <animate attributeName="r" values="10;15;10" dur="2s" repeatCount="indefinite" />
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite" />
        </circle>
        
        <!-- Text -->
        <text x="50" y="80" text-anchor="middle" fill="white" font-family="sans-serif" font-size="5">Click the circle</text>
    </svg>
</body>
</html>
